<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunlit Browser</title>
  <script src="./lithium-js/scram/scramjet.all.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #06090f;
      --chrome-bg: rgba(7,11,20,0.93);
      --chrome-border: rgba(255,255,255,0.06);
      --tab-bg:    rgba(255,255,255,0.04);
      --tab-active-bg: rgba(30,64,175,0.18);
      --tab-active-border: rgba(59,130,246,0.3);
      --blue:      #1a3a8f;
      --blue-h:    #122b6e;
      --gold:      #c9900d;
      --gold-h:    #d4a017;
      --gold-light:#f5c842;
      --text:      #cbd5e1;
      --text-dim:  #475569;
      --text-bright: #f1f5f9;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #loading.gone { display: none; }
    #loading img { width: 60px; height: 60px; object-fit: contain; }
    #loading h1 { font-size: 1.25rem; font-weight: 700; color: var(--text-bright); letter-spacing: 0.03em; }
    #loading p  { font-size: 0.8rem; color: var(--text-dim); }
    .spin {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.07);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tab bar ── */
    #tabbar {
      display: flex; align-items: center;
      padding: 5px 8px;
      background: var(--chrome-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--chrome-border);
      gap: 3px;
      height: 42px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tabbar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px;
      height: 30px;
      background: var(--tab-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px;
      cursor: pointer;
      min-width: 110px; max-width: 200px;
      font-size: 12px; color: var(--text-dim);
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      user-select: none;
    }
    .tab:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .tab.active {
      background: var(--tab-active-bg);
      border-color: var(--tab-active-border);
      color: var(--text-bright);
    }
    .tab.active .tab-title { color: var(--gold-light); }

    .tab-favicon {
      width: 14px; height: 14px; object-fit: contain;
      flex-shrink: 0; border-radius: 2px; display: none;
    }
    .tab-favicon.loaded { display: block; }
    .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tab-close {
      width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; font-size: 16px; color: var(--text-dim);
      line-height: 1; transition: background 0.1s, color 0.1s;
    }
    .tab-close:hover { background: rgba(220,38,38,0.18); color: #f87171; }

    #new-tab-btn {
      width: 28px; height: 28px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 6px;
      color: var(--text-dim); font-size: 20px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #new-tab-btn:hover { background: rgba(255,255,255,0.09); color: var(--gold-light); }

    /* ── Toolbar ── */
    #toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px;
      background: rgba(6,9,16,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(196,144,13,0.12);
    }

    .nav-btn {
      width: 30px; height: 30px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 7px;
      color: var(--text-dim); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.07);
      color: var(--gold-light);
    }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    #logo-img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }

    #urlbar-wrap {
      flex: 1;
      display: flex; align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px;
      padding: 0 12px; gap: 7px;
      transition: border-color 0.2s, background 0.2s;
    }
    #urlbar-wrap:focus-within {
      border-color: rgba(29,78,216,0.55);
      background: rgba(255,255,255,0.055);
      box-shadow: 0 0 0 2px rgba(29,78,216,0.12);
    }

    .lock-icon { flex-shrink: 0; color: var(--gold-light); }

    #urlbar {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text-bright); font-size: 13px; padding: 7px 0;
      text-align: center;
    }
    #urlbar:not(:placeholder-shown),
    #urlbar:focus { text-align: left; }
    #urlbar::placeholder { color: #2d3748; text-align: center; }


    /* ── Content ── */
    #content { flex: 1; position: relative; overflow: hidden; }

    .tab-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; display: none;
    }
    .tab-frame.active { display: block; }

    /* ── New tab page ── */
    .newtab-page {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: radial-gradient(ellipse at 50% 35%,
        rgba(29,78,216,0.08) 0%,
        rgba(196,144,13,0.04) 50%,
        var(--bg) 75%);
    }
    .newtab-page.active { display: flex; }

    .nt-logo { width: 58px; height: 58px; object-fit: contain; }
    .nt-title {
      font-size: 1.35rem; font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--gold-light) 0%, #fff 60%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nt-sub { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 0.02em; }

    .nt-bar {
      display: flex;
      width: 88%; max-width: 540px;
    }
    .nt-input {
      flex: 1; padding: 11px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      color: var(--text-bright); font-size: 14px; outline: none;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .nt-input:focus {
      border-color: rgba(29,78,216,0.5);
      box-shadow: 0 0 0 3px rgba(29,78,216,0.1);
      text-align: left;
    }
    .nt-input:not(:placeholder-shown) { text-align: left; }
    .nt-input::placeholder { color: #2d3748; }

    /* gold divider under toolbar */
    #gold-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(196,144,13,0.35), transparent);
    }
  </style>
</head>
<body>

  <div id="loading">
    <img src="https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png" alt="Sunlit" onerror="this.style.opacity=0">
    <h1>Sunlit Browser</h1>
    <div class="spin"></div>
    <p id="load-msg">Starting...</p>
  </div>

  <div id="tabbar">
    <button id="new-tab-btn" title="New tab">+</button>
  </div>

  <div id="toolbar">
    <button class="nav-btn" id="back-btn" title="Back">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8.5 1.5L3.5 6.5l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="nav-btn" id="fwd-btn" title="Forward">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M4.5 1.5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="nav-btn" id="reload-btn" title="Reload">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11 6.5A4.5 4.5 0 1 1 8.5 2.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8.5 1v2.2H10.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <img id="logo-img" src="https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png" alt="Sunlit" onerror="this.style.display='none'">
    <div id="urlbar-wrap">
      <svg class="lock-icon" width="11" height="13" viewBox="0 0 11 13" fill="none">
        <rect x="1" y="5.5" width="9" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M3 5.5V3.5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input id="urlbar" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false" />
    </div>
  </div>
  <div id="gold-line"></div>

  <div id="content"></div>

  <script type="module">
    import { setTransport, setWisp, getProxied } from "./lithium-js/lithium.mjs";

    setWisp("wss://anura.pro/");
    setTransport("epoxy");

    const loadingEl = document.getElementById("loading");
    const loadMsg   = document.getElementById("load-msg");
    const tabbar    = document.getElementById("tabbar");
    const newTabBtn = document.getElementById("new-tab-btn");
    const content   = document.getElementById("content");
    const urlbar    = document.getElementById("urlbar");
    const backBtn   = document.getElementById("back-btn");
    const fwdBtn    = document.getElementById("fwd-btn");
    const reloadBtn = document.getElementById("reload-btn");

    const LOGO = "https://raw.githubusercontent.com/EXVYS/Image-host/main/logo2.png";

    let tabs = [];
    let activeTabId = null;
    let tabCounter = 0;

    function waitForScramjet() {
      return new Promise(r => { const c = () => window.scramjet ? r() : setTimeout(c, 50); c(); });
    }

    async function waitForSWController() {
      if (!navigator.serviceWorker) return;
      await navigator.serviceWorker.ready;
      if (!navigator.serviceWorker.controller) {
        await new Promise(r => navigator.serviceWorker.addEventListener("controllerchange", r, { once: true }));
      }
    }

    function smartURL(input) {
      const s = input.trim();
      if (!s) return null;
      if (/^https?:\/\//i.test(s)) return s;
      const domainLike = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/.test(s) && !s.includes(" ");
      if (domainLike) return "https://" + s;
      return "https://search.brave.com/search?q=" + encodeURIComponent(s);
    }

    async function encodeURL(target) {
      const url = smartURL(target);
      if (!url) return null;
      return getProxied(url);
    }

    function getDisplayURL(frameHref) {
      try {
        const part = frameHref.split("/scramjet/")[1];
        return part ? decodeURIComponent(part) : "";
      } catch { return ""; }
    }

    function renderTabs() {
      tabbar.querySelectorAll(".tab").forEach(e => e.remove());
      tabs.forEach(tab => {
        const el = document.createElement("div");
        el.className = "tab" + (tab.id === activeTabId ? " active" : "");
        el.innerHTML = `
          <img class="tab-favicon${tab.favicon ? " loaded" : ""}" src="${tab.favicon || ""}" alt="">
          <span class="tab-title">${tab.title}</span>
          <span class="tab-close" data-id="${tab.id}">&times;</span>
        `;
        el.addEventListener("click", e => {
          if (!e.target.classList.contains("tab-close")) switchTab(tab.id);
        });
        el.querySelector(".tab-close").addEventListener("click", e => {
          e.stopPropagation(); closeTab(tab.id);
        });
        tabbar.insertBefore(el, newTabBtn);
      });
    }

    function updateUrlbar(tabId) {
      const tab = tabs.find(t => t.id === tabId);
      if (!tab) return;
      if (tab.url === null) { urlbar.value = ""; return; }
      try {
        const loc = tab.frame.contentWindow?.location?.href || "";
        urlbar.value = getDisplayURL(loc) || getDisplayURL(tab.url) || "";
      } catch { urlbar.value = getDisplayURL(tab.url) || ""; }
    }

    function switchTab(id) {
      activeTabId = id;
      tabs.forEach(t => {
        const isActive = t.id === id;
        t.frame.classList.toggle("active", isActive && t.url !== null);
        t.newtab.classList.toggle("active", isActive && t.url === null);
      });
      updateUrlbar(id);
      renderTabs();
    }

    function closeTab(id) {
      const idx = tabs.findIndex(t => t.id === id);
      if (idx === -1) return;
      const tab = tabs[idx];
      tab.frame.remove();
      tab.newtab.remove();
      tabs.splice(idx, 1);
      if (tabs.length === 0) { createTab(); return; }
      if (activeTabId === id) switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
      renderTabs();
    }

    async function navigateTab(tabId, target) {
      const tab = tabs.find(t => t.id === tabId);
      if (!tab) return;
      const proxied = await encodeURL(target);
      if (!proxied) return;
      tab.url = proxied;
      tab.title = "Loading...";
      tab.favicon = null;
      tab.frame.src = proxied;
      tab.newtab.classList.remove("active");
      tab.frame.classList.add("active");

      tab.frame.onload = () => {
        try {
          const loc = tab.frame.contentWindow?.location?.href || "";
          const display = getDisplayURL(loc);
          if (display) {
            try {
              const u = new URL(display);
              tab.title = u.hostname.replace(/^www\./, "") || "Page";
              tab.favicon = `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=32`;
            } catch { tab.title = "Page"; }
          } else {
            tab.title = "Page";
          }
        } catch { tab.title = "Page"; }
        if (activeTabId === tabId) updateUrlbar(tabId);
        renderTabs();
      };
      renderTabs();
    }

    function createTab(url = null) {
      const id = ++tabCounter;

      const frame = document.createElement("iframe");
      frame.className = "tab-frame";
      frame.id = `frame-${id}`;
      frame.src = "about:blank";
      content.appendChild(frame);

      const newtab = document.createElement("div");
      newtab.className = "newtab-page";
      newtab.id = `newtab-${id}`;
      newtab.innerHTML = `
        <img class="nt-logo" src="${LOGO}" alt="Sunlit" onerror="this.style.opacity=0">
        <div class="nt-title">Sunlit Browser</div>
        <div class="nt-sub">Where do you want to go today?</div>
        <div class="nt-bar">
          <input class="nt-input" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false">
        </div>
      `;
      content.appendChild(newtab);

      const tab = { id, frame, newtab, title: "New Tab", url: null, favicon: null };
      tabs.push(tab);

      const ntInput = newtab.querySelector(".nt-input");
      const doNav   = () => { const v = ntInput.value.trim(); if (v) navigateTab(id, v); };
      ntInput.addEventListener("keydown", e => { if (e.key === "Enter") doNav(); });

      renderTabs();
      switchTab(id);
      if (url) navigateTab(id, url);
      setTimeout(() => { if (!url) ntInput.focus(); }, 50);
      return id;
    }

    function navigate() {
      const val = urlbar.value.trim();
      if (!val) return;
      if (activeTabId) navigateTab(activeTabId, val);
      else createTab(val);
    }

    urlbar.addEventListener("keydown", e => { if (e.key === "Enter") navigate(); });
    newTabBtn.addEventListener("click", () => createTab());

    backBtn.addEventListener("click", () => {
      const tab = tabs.find(t => t.id === activeTabId);
      if (tab) try { tab.frame.contentWindow.history.back(); } catch {}
    });
    fwdBtn.addEventListener("click", () => {
      const tab = tabs.find(t => t.id === activeTabId);
      if (tab) try { tab.frame.contentWindow.history.forward(); } catch {}
    });
    reloadBtn.addEventListener("click", () => {
      const tab = tabs.find(t => t.id === activeTabId);
      if (!tab || tab.url === null) return;
      try { tab.frame.contentWindow.location.reload(); } catch { tab.frame.src = tab.url; }
    });

    loadMsg.textContent = "Waiting for service worker...";
    await waitForSWController();

    loadMsg.textContent = "Initializing scramjet...";
    await waitForScramjet();

    loadingEl.classList.add("gone");
    createTab();
  </script>
</body>
</html>
