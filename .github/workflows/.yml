name: Project

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  start-application:
    name: Start application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Start application
        run: node server.js
        
    # Note: GitHub Actions doesn't have direct port forwarding like Nitric
    # The application will run but won't be publicly accessible via port 80
    # For web applications, you might want to add deployment steps
